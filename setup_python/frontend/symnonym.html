<!DOCTYPE html>
<html lang="th" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>คำพ้องความหมาย</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  /* ── Design tokens ── */
  :root {
    --bg:       #16293a;
    --surface:  #1f3a50;
    --surface2: #122030;
    --border:   rgba(255,255,255,0.08);
    --text:     #cfe0ec;
    --muted:    #5c7e95;
    --accent:   #c4956a;
    --accent-h: #d4a87c;
    --pill:     rgba(240,168,184,0.18);
    --pill-h:   rgba(240,168,184,0.32);
    --ok:       #4ade80;
    --err:      #f87171;
    --shadow:   0 4px 28px rgba(0,0,0,0.5);
    --radius:   14px;
    --trans:    0.22s ease;
  }
  [data-theme="light"] {
    --bg:       #afc6d4;
    --surface:  #ffffff;
    --surface2: #dceaf2;
    --border:   rgba(0,0,0,0.07);
    --text:     #1a3040;
    --muted:    #5e8aa4;
    --accent:   #b8854c;
    --accent-h: #cc9a5e;
    --pill:     #f0a8b8;
    --pill-h:   #e894a8;
    --ok:       #16a34a;
    --err:      #dc2626;
    --shadow:   0 4px 20px rgba(0,0,0,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Kanit', sans-serif;
    font-weight: 300;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background var(--trans), color var(--trans);
  }

  /* ── Navbar ── */
  .navbar {
    display: flex;
    align-items: center;
    padding: 0 28px;
    height: 56px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
    gap: 8px;
    transition: background var(--trans);
  }
  .nav-brand {
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--accent);
    text-decoration: none;
    letter-spacing: 0.5px;
    margin-right: 16px;
    white-space: nowrap;
  }
  .nav-links { display: flex; gap: 2px; flex: 1; }
  .nav-link {
    padding: 6px 14px;
    border-radius: 8px;
    font-size: 0.87rem;
    font-family: inherit;
    font-weight: 400;
    color: var(--muted);
    text-decoration: none;
    transition: all var(--trans);
    white-space: nowrap;
  }
  .nav-link:hover  { color: var(--text); background: var(--surface2); }
  .nav-link.active { color: var(--accent); background: var(--surface2); font-weight: 600; }
  .theme-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 6px 14px;
    font-size: 0.8rem;
    font-family: inherit;
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all var(--trans);
    white-space: nowrap;
  }
  .theme-btn:hover { color: var(--text); border-color: var(--accent); }

  /* ── Hero ── */
  .hero {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 52px 24px 48px;
  }

  .avatar {
    width: 148px;
    height: 148px;
    border-radius: 50%;
    background: var(--accent);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin-bottom: 40px;
    box-shadow: 0 8px 36px rgba(0,0,0,0.35);
    flex-shrink: 0;
    transition: background var(--trans);
  }
  .avatar-title {
    font-size: 2.5rem;
    font-weight: 600;
    color: #1a1a2e;
    line-height: 1;
  }
  .avatar-sub {
    font-size: 0.8rem;
    font-weight: 400;
    color: rgba(26,26,46,0.6);
    margin-top: 4px;
  }

  /* ── Nav pill buttons ── */
  .nav-btns {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 36px;
  }
  .nav-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 36px;
    border-radius: 50px;
    font-size: 0.97rem;
    font-family: inherit;
    font-weight: 400;
    text-decoration: none;
    color: var(--text);
    background: var(--pill);
    border: none;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    cursor: pointer;
    transition: all var(--trans);
  }
  .nav-pill:hover {
    background: var(--pill-h);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.2);
  }

  /* ── Search ── */
  .search-wrap {
    width: 100%;
    max-width: 580px;
    position: relative;
  }
  .search-input {
    width: 100%;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 14px 52px 14px 26px;
    font-size: 1.02rem;
    font-family: inherit;
    font-weight: 300;
    outline: none;
    box-shadow: var(--shadow);
    transition: border-color var(--trans), background var(--trans);
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--muted); opacity: 0.65; }
  .search-icon {
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
    font-size: 1rem;
  }
  .search-hint {
    margin-top: 10px;
    font-size: 0.78rem;
    color: var(--muted);
    text-align: center;
    min-height: 18px;
  }

  /* ── Results ── */
  .results {
    width: 100%;
    max-width: 580px;
    margin-top: 22px;
  }
  .result-header {
    font-size: 0.8rem;
    color: var(--muted);
    text-align: center;
    margin-bottom: 14px;
  }
  .result-header strong { color: var(--accent); font-weight: 600; }
  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
  }
  .tag {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 7px 18px;
    font-size: 0.98rem;
    font-family: inherit;
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .tag:hover  { border-color: var(--accent); color: var(--accent); }
  .tag.copied { background: var(--ok); border-color: var(--ok); color: #fff; }
  .empty-msg  { color: var(--muted); text-align: center; font-size: 0.9rem; }
</style>
</head>
<body>

<nav class="navbar">
  <a class="nav-brand" href="/">พ้องความหมาย</a>
  <div class="nav-links">
    <a href="/" class="nav-link active">ค้นหาคำพ้อง</a>
    <a href="/dictionary" class="nav-link">ตารางแสดงคำศัพท์</a>
    <a href="/poem" class="nav-link">แต่งกลอนแปด</a>
  </div>
  <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">
    <span id="themeIcon">☀</span><span id="themeLabel">โหมดสว่าง</span>
  </button>
</nav>

<div class="hero">
  <div class="avatar">
    <span class="avatar-title">พ้อง</span>
    <span class="avatar-sub">ความหมาย</span>
  </div>

  <div class="nav-btns">
    <a class="nav-pill" href="/dictionary">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      ตารางแสดงคำศัพท์
    </a>
    <a class="nav-pill" href="/poem">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      แต่งกลอนแปด
    </a>
  </div>

  <div class="search-wrap">
    <input class="search-input" id="wordInput" type="text"
      placeholder="พิมพ์คำที่ค้นหาที่นี่ . . ." autocomplete="off" />
    <span class="search-icon">⌕</span>
  </div>
  <p class="search-hint" id="hint">คลิกที่ข้อความเพื่อคัดลอก</p>

  <div class="results" id="results"></div>
</div>

<script>
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  const dark = t === 'dark';
  document.getElementById('themeIcon').textContent  = dark ? '☀' : '🌙';
  document.getElementById('themeLabel').textContent = dark ? 'โหมดสว่าง' : 'โหมดมืด';
  localStorage.setItem('thai-theme', t);
}
function toggleTheme() {
  applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
}
applyTheme(localStorage.getItem('thai-theme') || 'dark');

let timer;
const input   = document.getElementById('wordInput');
const results = document.getElementById('results');
const hint    = document.getElementById('hint');

function lookup(word) {
  word = word.trim();
  if (!word) { results.innerHTML = ''; hint.textContent = 'คลิกที่ข้อความเพื่อคัดลอก'; return; }
  hint.textContent = 'กำลังค้นหา…';
  fetch(`/api/synonym?word=${encodeURIComponent(word)}`)
    .then(r => r.json())
    .then(data => {
      if (data.error || !data.synonyms?.length) {
        results.innerHTML = `<div class="empty-msg">ไม่พบคำพ้องสำหรับ "<strong>${word}</strong>"</div>`;
        hint.textContent = '';
        return;
      }
      hint.textContent = 'คลิกที่คำเพื่อคัดลอก';
      results.innerHTML =
        `<div class="result-header">คำพ้องของ <strong>${data.word}</strong> — ${data.synonyms.length} คำ</div>` +
        `<div class="tags">${data.synonyms.map(s =>
          `<span class="tag" onclick="copyTag(this,'${s.replace(/'/g,"&#39;")}')">${s}</span>`
        ).join('')}</div>`;
    })
    .catch(() => {
      results.innerHTML = `<div class="empty-msg" style="color:var(--err)">เชื่อมต่อ API ไม่ได้</div>`;
      hint.textContent = '';
    });
}

function copyTag(el, text) {
  navigator.clipboard.writeText(text).then(() => {
    el.classList.add('copied');
    setTimeout(() => el.classList.remove('copied'), 900);
  });
}

input.addEventListener('input',   () => { clearTimeout(timer); timer = setTimeout(() => lookup(input.value), 300); });
input.addEventListener('keydown', e => { if (e.key === 'Enter') { clearTimeout(timer); lookup(input.value); } });
</script>
</body>
</html>
